name: DOI Collector - Zyntra Research

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari kur
        run: pip install httpx

      - name: DOI Collector calistir
        run: python scripts/doi_collector_github.py

      - name: Sonuclari commit et
        run: |
          git config user.name "zyntra-bot"
          git config user.email "bot@zyntra.ai"
          git add -A
          git diff --staged --quiet || git commit -m "DOI update $(date +%Y-%m-%d-%H%M) - $(cat data/summary.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(str(d["total_doi"])+ " DOI")' 2>/dev/null || echo '')"
          git push
