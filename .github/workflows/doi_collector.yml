name: DOI Collector

on:
  schedule:
    - cron: "0 */6 * * *"  # Her 6 saatte bir
  workflow_dispatch:           # Elle de tetiklenebilir

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 300       # 5 saat max

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari kur
        run: pip install httpx

      - name: DOI Collector calistir
        run: python scripts/doi_collector_colab.py

      - name: Sonuclari commit et
        run: |
          git config user.name "zyntra-bot"
          git config user.email "zyntra-automation@colab-erisim.iam.gserviceaccount.com"
          git add -A
          git diff --staged --quiet || git commit -m "DOI update - $(date +%Y-%m-%d-%H%M)"
          git push
