name: DOI Collector - Zyntra Research

on:
  schedule:
    - cron: "*/30 * * * *"   # Her 30 dakikada bir
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 28       # 28 dakika — commit icin 2 dk birakir

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-httpx

      - name: Bagimliliklari kur
        run: pip install -q httpx

      - name: DOI Collector calistir (25 dk limit)
        run: timeout 1500 python scripts/doi_collector_github.py || true
        # 1500 saniye = 25 dakika, sonra dur, commit et

      - name: Sonuclari commit et
        run: |
          git config user.name "zyntra-bot"
          git config user.email "bot@zyntra.ai"
          git add -A
          if git diff --staged --quiet; then
            echo "Degisiklik yok"
          else
            TOTAL=$(python3 -c "import json; d=json.load(open('data/summary.json')); print(d.get('total_doi',0))" 2>/dev/null || echo "?")
            git commit -m "DOI update $(date +%Y-%m-%d-%H%M) | toplam: $TOTAL DOI"
            git push
            echo "Commit edildi: $TOTAL DOI"
          fi
