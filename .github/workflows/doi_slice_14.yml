name: DOI Collector - Slice 14

on:
  schedule:
    - cron: "44 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1

      - name: Onceki ozeti getir (summary icin)
        run: |
          git fetch origin slice/14 --depth=1 2>/dev/null || true
          git checkout origin/slice/14 -- data/slice_14/summary.json 2>/dev/null || true
          mkdir -p data/slice_14

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -q httpx

      - name: DOI Collector Slice 14
        run: timeout 1380 python scripts/doi_collector_slice.py --job-id 14 --total-jobs 20 || true

      - name: Push slice/14
        run: |
          git config user.name "zyntra-bot"
          git config user.email "bot@zyntra.ai"
          git add data/slice_14/summary.json data/slice_14/progress.json 2>/dev/null || true
          # JSONL cok buyuyor - sadece summary/progress push et, JSONL'u gitignore et
          echo "data/slice_14/dois.jsonl" >> .gitignore
          git add .gitignore
          git diff --staged --quiet && exit 0
          TOTAL=$(python3 -c "import json,pathlib; f=pathlib.Path('data/slice_14/summary.json'); print(json.loads(f.read_text()).get('new_this_run',0) if f.exists() else 0)" 2>/dev/null || echo 0)
          git commit -m "$(date +%H%M) +${TOTAL}DOI slice14"
          git push --force origin HEAD:refs/heads/slice/14