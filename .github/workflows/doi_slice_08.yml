name: DOI Collector - Slice 08

on:
  schedule:
    - cron: "26 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari kur
        run: pip install -q httpx

      - name: DOI Collector Slice 08
        run: timeout 1380 python scripts/doi_collector_slice.py --job-id 8 --total-jobs 20 || true

      - name: Commit (conflict-free)
        run: |
          git config user.name "zyntra-bot"
          git config user.email "bot@zyntra.ai"
          git add data/slice_08/ || true
          if git diff --staged --quiet; then
            echo "no change"
          else
            TOTAL=$(python3 -c "import json,pathlib; f=pathlib.Path('data/slice_08/summary.json'); print(json.loads(f.read_text()).get('new_this_run',0) if f.exists() else 0)" 2>/dev/null || echo "?")
            git stash
            git pull --rebase origin main || true
            git stash pop || true
            git add data/slice_08/
            git commit -m "Slice 08 $(date +%H%M) +${TOTAL}DOI" || true
            git push origin main
          fi