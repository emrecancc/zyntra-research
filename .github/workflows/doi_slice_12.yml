name: DOI Collector - Slice 12

on:
  schedule:
    - cron: "38 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - name: Checkout slice branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: slice/12
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: scripts al (main'den)
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- scripts/doi_collector_slice.py
          git checkout origin/main -- scripts/query_slices/ 2>/dev/null || true

      - name: Bagimliliklari kur
        run: pip install -q httpx

      - name: DOI Collector Slice 12
        run: timeout 1380 python scripts/doi_collector_slice.py --job-id 12 --total-jobs 20 || true

      - name: Push to slice/12
        run: |
          git config user.name "zyntra-bot"
          git config user.email "bot@zyntra.ai"
          git add data/slice_12/ || true
          if git diff --staged --quiet; then
            echo "no change"
          else
            TOTAL=$(python3 -c "import json,pathlib; f=pathlib.Path('data/slice_12/summary.json'); print(json.loads(f.read_text()).get('new_this_run',0) if f.exists() else 0)" 2>/dev/null || echo 0)
            git commit -m "$(date +%H%M) +${TOTAL}DOI"
            git push origin slice/12
          fi