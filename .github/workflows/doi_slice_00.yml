name: DOI Collector - Slice 00

on:
  schedule:
    - cron: "2 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - name: Checkout main (scripts + query_slices)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          sparse-checkout: |
            scripts/
            .github/

      - name: Fetch and merge slice data
        run: |
          git fetch origin slice/00 --depth=50 2>/dev/null || true
          git checkout origin/slice/00 -- data/slice_00/ 2>/dev/null || true
          mkdir -p data/slice_00

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari kur
        run: pip install -q httpx

      - name: DOI Collector Slice 00
        run: timeout 1380 python scripts/doi_collector_slice.py --job-id 0 --total-jobs 20 || true

      - name: Push to slice/00
        run: |
          git config user.name "zyntra-bot"
          git config user.email "bot@zyntra.ai"
          git add data/slice_00/ || true
          if git diff --staged --quiet; then
            echo "no change"
            exit 0
          fi
          TOTAL=$(python3 -c "import json,pathlib; f=pathlib.Path('data/slice_00/summary.json'); print(json.loads(f.read_text()).get('new_this_run',0) if f.exists() else 0)" 2>/dev/null || echo 0)
          git commit -m "$(date +%H%M) +${TOTAL}DOI"
          git push origin HEAD:slice/00