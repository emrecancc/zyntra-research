name: DOI Collector - Slice 07

on:
  schedule:
    - cron: "21 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${ secrets.GITHUB_TOKEN }
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bagimliliklari kur
        run: pip install -q httpx
      - name: DOI Collector Slice 07
        run: timeout 1380 python scripts/doi_collector_slice.py --job-id 7 --total-jobs 20 || true
      - name: Commit
        run: |
          git config user.name "zyntra-bot"
          git config user.email "bot@zyntra.ai"
          git add -A
          if git diff --staged --quiet; then echo "no change"; else
            TOTAL=$(python3 -c "import json,pathlib; f=pathlib.Path('data/summary_07.json'); print(json.loads(f.read_text()).get('total_doi',0) if f.exists() else 0)" 2>/dev/null || echo "?")
            git commit -m "Slice 07 $(date +%Y-%m-%d-%H%M) DOI:$TOTAL"
            git push
          fi