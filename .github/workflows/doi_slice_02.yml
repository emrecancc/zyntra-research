name: DOI Collector - Slice 02

on:
  schedule:
    - cron: "8 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1

      - name: Onceki veriyi getir
        run: |
          git fetch origin slice/02 --depth=5 2>/dev/null || true
          git checkout origin/slice/02 -- data/slice_02/ 2>/dev/null || mkdir -p data/slice_02

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -q httpx

      - name: DOI Collector Slice 02
        run: timeout 1380 python scripts/doi_collector_slice.py --job-id 2 --total-jobs 20 || true

      - name: Push slice/02
        run: |
          git config user.name "zyntra-bot"
          git config user.email "bot@zyntra.ai"
          git add data/slice_02/ || true
          git diff --staged --quiet && exit 0
          TOTAL=$(python3 -c "import json,pathlib; f=pathlib.Path('data/slice_02/summary.json'); print(json.loads(f.read_text()).get('new_this_run',0) if f.exists() else 0)" 2>/dev/null || echo 0)
          git commit -m "$(date +%H%M) +${TOTAL}DOI"
          git push --force origin HEAD:refs/heads/slice/02